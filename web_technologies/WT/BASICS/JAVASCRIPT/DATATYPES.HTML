<body>

<h2>JavaScript Datatypes</h2>

<script>
var number = 100;
var decimal = 120.5;
var text = "Hello";
var flag = true;
var empty = null;
var notDefined;

document.write(number + "<br>");
document.write(decimal + "<br>");
document.write(text + "<br>");
document.write(flag + "<br>");
document.write(empty + "<br>");
document.write(notDefined);
</script>
